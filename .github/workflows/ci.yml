name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  WORKING_DIR: "Weekly challenges/week 01/ticketTriage"

jobs:
  test:
    name: Lint · Unit · Integration
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: "Weekly challenges/week 01/ticketTriage/package.json"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: "Weekly challenges/week 01/ticketTriage/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: "Weekly challenges/week 01/ticketTriage"
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: "Weekly challenges/week 01/ticketTriage"
        run: pnpm exec prisma generate

      - name: Type check
        working-directory: "Weekly challenges/week 01/ticketTriage"
        run: pnpm typecheck

      - name: Lint
        working-directory: "Weekly challenges/week 01/ticketTriage"
        run: pnpm lint

      - name: Unit tests
        working-directory: "Weekly challenges/week 01/ticketTriage"
        run: pnpm test

      - name: Apply migrations (test DB)
        working-directory: "Weekly challenges/week 01/ticketTriage"
        run: pnpm exec prisma migrate deploy
        env:
          DATABASE_URL: file:./prisma/test.db

      - name: Integration tests
        working-directory: "Weekly challenges/week 01/ticketTriage"
        run: pnpm test:integration
        env:
          DATABASE_URL: file:./prisma/test.db

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: "Weekly challenges/week 01/ticketTriage/package.json"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: "Weekly challenges/week 01/ticketTriage/pnpm-lock.yaml"

      - name: Install dependencies
        working-directory: "Weekly challenges/week 01/ticketTriage"
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: "Weekly challenges/week 01/ticketTriage"
        run: pnpm exec prisma generate

      - name: Build
        working-directory: "Weekly challenges/week 01/ticketTriage"
        run: pnpm build
