openapi: 3.1.0

info:
  title: BookSwap API
  version: 0.1.0
  description:
    This API server allows members of BookSwap to list books they own,
    search the catalogue, request to borrow books,
    and accept or decline borrow requests.

servers:
  - url: "https://api.bookswap.local"

paths:

  /books:
    get:
      summary: Search and list books

      parameters:
        - name: search
          in: query
          description: Search books by title, author, or ISBN
          schema:
            type: string

        - name: condition
          in: query
          description: Filter books by condition
          schema:
            type: string

        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            minimum: 1

        - name: pageSize
          in: query
          description: Number of results per page
          schema:
            type: integer
            minimum: 1
            maximum: 10

      responses:
        "200": {description: Successful retrieval of books}
        "401": {description: Missing or invalid token}

    post:
      summary: List a new book

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Book"

      responses:
        "201": {description: Book successfully listed}
        "400": {description: Invalid input}
        "401": {description: Missing or invalid token}

  /books/{bookId}/borrow-requests:

    post:
      summary: Request to borrow a book

      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BorrowRequest"

      responses:
        "201": {description: Borrow request created}
        "404": {description: Book not found}

  /borrow-requests/{requestId}:

    patch:
      summary: Accept or decline a borrow request

      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                status:
                  type: string
                  enum:
                    - accepted
                    - declined

      responses:
        "200": {description: Borrow request updated}
        "404": {description: Borrow request not found}

  /loans/{loanId}:

    patch:
      summary: Mark a loan as returned

      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                status:
                  type: string
                  enum:
                    - returned

      responses:
        "200": {description: Loan updated successfully}
        "404": {description: Loan not found}

components:
  schemas:

    Book:
      type: object

      required:
        - title
        - author
        - isbn
        - condition

      properties:

        id:
          type: string

        title:
          type: string

        author:
          type: string

        isbn:
          type: string

        condition:
          type: string

        photo:
          type: string
          format: uri
          description: URL of uploaded JPEG or PNG image stored in Blob Storage

        available:
          type: boolean

    BorrowRequest:
      type: object

      properties:

        id:
          type: string

        bookId:
          type: string

        memberId:
          type: string

        status:
          type: string
          enum:
            - pending
            - accepted
            - declined

    Loan:
      type: object

      properties:

        id:
          type: string

        borrowerId:
          type: string

        status:
          type: string
          description: Loan is overdue if not returned within 30 days
          enum:
            - out
            - returned
            - overdue

        dueDate:
          type: string
          format: date