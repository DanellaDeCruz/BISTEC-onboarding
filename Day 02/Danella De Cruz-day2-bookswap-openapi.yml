openapi: 3.1.0

info:
  title: BookSwap API
  version: 0.1.0
  description: |
    API for managing book listings, borrowing, loans, and notifications
    in the BookSwap apartment community marketplace.

servers:
  - url: https://api.bookswap.local

security:
  - bearerAuth: []

paths:
  /books:
    get:
      operationId: searchBooks
      summary: List books in the building

      parameters:
        - name: title
          in: query
          schema:
            type: string
          description: Filter by title

        - name: author
          in: query
          schema:
            type: string
          description: Filter by author

        - name: isbn
          in: query
          schema:
            type: string
          description: Filter by ISBN

        - name: condition
          in: query
          schema:
            type: string
            enum: [new, like_new, good, fair, poor]
          description: Filter by condition

        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
          description: Page number

        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
          description: Number of books per page

      responses:
        "200":
          description: Page of books
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Page'

        "401":
          description: Missing or invalid token

    post:
      operationId: listBook
      summary: List a new book

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object

              properties:
                title:
                  type: string

                author:
                  type: string

                isbn:
                  type: string

                condition:
                  type: string
                  enum: [new, like_new, good, fair, poor]

                photo:
                  type: string
                  format: binary

                available:
                  type: boolean

              required:
                - title
                - author
                - isbn
                - condition
                - available

      responses:
        "201":
          description: Book listed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'

        "400":
          description: Invalid request payload

        "401":
          description: Missing or invalid token

        "422":
          description: Validation failed

  /books/{bookId}:
    parameters:
      - name: bookId
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getBookDetails
      summary: Retrieve a single book and borrower history

      responses:
        "200":
          description: Book details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookDetails'

        "404":
          description: Book not found

        "401":
          description: Missing or invalid token

  /books/{bookId}/borrow-requests:
    post:
      operationId: requestBorrow
      summary: Request to borrow a book

      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string

      responses:
        "201":
          description: Borrow request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BorrowRequest'

        "404":
          description: Book not found

        "401":
          description: Missing or invalid token

  /borrow-requests/{requestId}:
    parameters:
      - name: requestId
        in: path
        required: true
        schema:
          type: string

    patch:
      operationId: respondToBorrowRequest
      summary: Accept or decline a borrow request

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object

              properties:
                accept:
                  type: boolean

              required:
                - accept

      responses:
        "200":
          description: Borrow request updated

        "404":
          description: Borrow request not found

        "401":
          description: Missing or invalid token

  /loans:
    get:
      operationId: listLoans
      summary: List loans with filters

      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [out, returned, overdue]

      responses:
        "200":
          description: List of loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Loan'

        "401":
          description: Missing or invalid token

  /loans/{loanId}:
    patch:
      operationId: markLoanReturned
      summary: Mark a loan returned

      parameters:
        - name: loanId
          in: path
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Loan marked returned

        "404":
          description: Loan not found

        "401":
          description: Missing or invalid token

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Book:
      type: object

      properties:
        id:
          type: string

        title:
          type: string

        author:
          type: string

        isbn:
          type: string

        condition:
          type: string
          enum: [new, like_new, good, fair, poor]

        photoUrl:
          type: string
          format: uri

        available:
          type: boolean

    BorrowRequest:
      type: object

      properties:
        requestId:
          type: string

        bookId:
          type: string

        status:
          type: string
          enum: [pending, accepted, declined]

    Loan:
      type: object

      properties:
        loanId:
          type: string

        bookId:
          type: string

        borrowerId:
          type: string

        loanDate:
          type: string
          format: date-time

        returnDate:
          type: string
          format: date-time
          nullable: true

        status:
          type: string
          enum: [out, returned, overdue]

    BookDetails:
      allOf:
        - $ref: '#/components/schemas/Book'

        - type: object
          properties:
            borrowerHistory:
              type: array
              items:
                $ref: '#/components/schemas/Loan'

    Page:
      type: object

      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Book'

        total:
          type: integer

        page:
          type: integer

        pageSize:
          type: integer